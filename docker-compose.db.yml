version: '3.8'

services:
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: lumine-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lumine
      MYSQL_USER: lumine
      MYSQL_PASSWORD: lumine
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - lumine
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL
  postgres:
    image: postgres:16
    container_name: lumine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lumine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - lumine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MariaDB
  mariadb:
    image: mariadb:11.2
    container_name: lumine-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lumine
      MYSQL_USER: lumine
      MYSQL_PASSWORD: lumine
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - lumine
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: lumine-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: lumine
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init:/docker-entrypoint-initdb.d
    networks:
      - lumine
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: lumine-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lumine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: lumine-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - lumine
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # phpMyAdmin (MySQL/MariaDB Admin)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lumine-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOSTS: mysql,mariadb
      PMA_PORTS: 3306,3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 256M
    ports:
      - "8080:80"
    networks:
      - lumine
    depends_on:
      - mysql
      - mariadb

  # Adminer (Universal DB Admin)
  adminer:
    image: adminer:latest
    container_name: lumine-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha
    ports:
      - "8081:8080"
    networks:
      - lumine
    depends_on:
      - mysql
      - postgres
      - mariadb

  # Mongo Express (MongoDB Admin)
  mongo-express:
    image: mongo-express:latest
    container_name: lumine-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8082:8081"
    networks:
      - lumine
    depends_on:
      - mongodb

  # Redis Commander (Redis Admin)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lumine-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8083:8081"
    networks:
      - lumine
    depends_on:
      - redis

  # pgAdmin (PostgreSQL Admin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lumine-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lumine.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8084:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - lumine
    depends_on:
      - postgres

  # Caddy (Modern Web Server)
  caddy:
    image: caddy:latest
    container_name: lumine-caddy
    restart: unless-stopped
    ports:
      - "8085:80"
      - "8445:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./scripts/caddy:/etc/caddy
    networks:
      - lumine
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lumine:
    driver: bridge
    name: lumine

volumes:
  mysql_data:
    name: lumine_mysql_data
  postgres_data:
    name: lumine_postgres_data
  mariadb_data:
    name: lumine_mariadb_data
  mongodb_data:
    name: lumine_mongodb_data
  redis_data:
    name: lumine_redis_data
  elasticsearch_data:
    name: lumine_elasticsearch_data
  pgadmin_data:
    name: lumine_pgadmin_data
  caddy_data:
    name: lumine_caddy_data
  caddy_config:
    name: lumine_caddy_config

name: Test Lumine

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Docker
        run: |
          docker --version
          docker-compose --version
      
      - name: Make executable
        run: chmod +x lumine.sh
      
      - name: Test help command
        run: ./lumine.sh help
      
      - name: Test version command
        run: ./lumine.sh version
